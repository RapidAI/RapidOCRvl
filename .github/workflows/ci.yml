name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  GO_VERSION: "1.22.x"
  NODE_VERSION: "20"
  CI_PACKAGE_VERSION: 0.0.${{ github.run_number }}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cmd/paddleocrvl-client/frontend/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Build frontend assets
        working-directory: cmd/paddleocrvl-client/frontend
        run: |
          npm ci
          npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Run focused race tests
        if: runner.os == 'Linux'
        run: go test -race ./cmd/paddleocrvl-server ./internal/tokenizer ./internal/model

      - name: Audit frontend dependencies
        working-directory: cmd/paddleocrvl-client/frontend
        run: npm audit

  package-windows:
    name: Package Windows (${{ matrix.arch }})
    needs: test
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cmd/paddleocrvl-client/frontend/package-lock.json

      - name: Install build tools
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          if (!(Test-Path "${env:ProgramFiles(x86)}\NSIS\makensis.exe")) {
            throw "NSIS makensis.exe was not installed"
          }

      - name: Build NSIS installer
        shell: pwsh
        env:
          ARCH: ${{ matrix.arch }}
        run: .\packaging\windows\build-nsis.ps1 -Version $env:CI_PACKAGE_VERSION -Arch $env:ARCH -Makensis "${env:ProgramFiles(x86)}\NSIS\makensis.exe"

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: release-package-windows-${{ matrix.arch }}
          path: dist/windows/*.exe
          if-no-files-found: error

  package-macos:
    name: Package macOS
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cmd/paddleocrvl-client/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build PKG
        env:
          VERSION: ${{ env.CI_PACKAGE_VERSION }}
        run: sh ./packaging/macos/build-pkg.sh

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: release-package-macos
          path: dist/macos/*.pkg
          if-no-files-found: error

  package-linux:
    name: Package Linux (${{ matrix.arch }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cmd/paddleocrvl-client/frontend/package-lock.json

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            fuse \
            imagemagick \
            libfuse2 \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build AppImage
        env:
          VERSION: ${{ env.CI_PACKAGE_VERSION }}
          ARCH: ${{ matrix.arch }}
        run: sh ./packaging/linux/build-appimage.sh

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: release-package-linux-${{ matrix.arch }}
          path: dist/linux/*.AppImage
          if-no-files-found: error
